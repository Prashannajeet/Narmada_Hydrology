services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nita_dam_registry}
      POSTGRES_USER: ${POSTGRES_USER:-nita_dam_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - dam_registry_pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nita_dam_user} -d ${POSTGRES_DB:-nita_dam_registry}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://nita_dam_user:change-me@db:5432/nita_dam_registry}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:13000,http://127.0.0.1:13000,http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-18080}:8080"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:18080}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:18080}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-13000}:3000"

  streamlit:
    build: ./streamlit_app
    environment:
      API_BASE_URL: ${STREAMLIT_API_BASE_URL:-http://backend:8080}
      DEMO_EMAIL: ${DEMO_EMAIL:-admin@nita.ai}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-nita-admin}
    depends_on:
      - backend
    ports:
      - "${STREAMLIT_PORT:-18501}:8501"

volumes:
  dam_registry_pgdata:
