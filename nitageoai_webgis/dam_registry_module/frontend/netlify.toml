[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NEXT_OUTPUT = "export"
  NEXT_PUBLIC_API_BASE_URL = ""

[[redirects]]
  from = "/uploads/*"
  to = "https://nita-dam-risk-api.onrender.com/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
