# Streamlit secrets template.
# Do not commit real API keys. Copy this block into Streamlit Cloud -> App -> Settings -> Secrets.

[google_flood]
api_key = "YOUR_GOOGLE_FLOOD_API_KEY"
cloud_project_id = "YOUR_GOOGLE_CLOUD_PROJECT_ID"
base_url = "https://floodforecasting.googleapis.com"
include_non_quality_verified = "true"

[copernicus]
url = "https://ewds.climate.copernicus.eu/api"
key = "YOUR_COPERNICUS_API_TOKEN"
